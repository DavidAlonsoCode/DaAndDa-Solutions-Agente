version: '3.8'

services:
  agent-app:
    build: .
    container_name: dada-solutions-agent
    ports:
      - "8000:8000"
    volumes:
      # Montamos el archivo SQLite para que la memoria persista incluso si el contenedor se destruye
      - ./chat_history.db:/app/chat_history.db
    env_file:
      - .env
    restart: "no"
